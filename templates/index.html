<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Pogoda</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 { font-size: 1.5rem; margin-bottom: 20px; }
    label { display: block; margin-top: 12px; font-size: 0.9rem; color: #555; }
    select, button {
      display: block;
      width: 100%;
      margin-top: 4px;
      padding: 8px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 16px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .error { margin-top: 16px; color: red; }
    .result {
      margin-top: 24px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
    }
    .result h2 { margin-bottom: 12px; font-size: 1.1rem; }
    .result p { margin: 6px 0; color: #333; }
  </style>
</head>
<body>

<h1>🌤️ Sprawdź pogodę</h1>

<form method="POST">
  <label>Kraj</label>
  <select name="country" id="country" onchange="updateCities()">
    <option value="">— wybierz —</option>
    {% for c in cities %}
      <option value="{{ c }}" {% if c == country %}selected{% endif %}>{{ c }}</option>
    {% endfor %}
  </select>

  <label>Miasto</label>
  <select name="city" id="city">
    <option value="">— wybierz —</option>
    {% if country %}
      {% for name, lat, lon in cities[country] %}
        <option value="{{ name }}" {% if name == city %}selected{% endif %}>{{ name }}</option>
      {% endfor %}
    {% endif %}
  </select>

  <button type="submit">Sprawdź</button>
</form>

{% if error %}
  <p class="error">{{ error }}</p>
{% endif %}

{% if weather %}
  <div class="result">
    <h2>📍 {{ city }}, {{ country }}</h2>
    <p>{{ weather.desc }}</p>
    <p><strong>Temperatura:</strong> {{ weather.temp }} °C</p>
    <p><strong>Wiatr:</strong> {{ weather.wind }} km/h</p>
    {% if weather.humidity is not none %}
    <p><strong>Wilgotność:</strong> {{ weather.humidity }} %</p>
    {% endif %}
  </div>
{% endif %}

<script>
  const cities = {{ cities | tojson }};
  function updateCities() {
    const country = document.getElementById("country").value;
    const sel = document.getElementById("city");
    sel.innerHTML = '<option value="">— wybierz —</option>';
    if (cities[country]) {
      cities[country].forEach(([name]) => {
        sel.innerHTML += `<option value="${name}">${name}</option>`;
      });
    }
  }
</script>

</body>
</html>
